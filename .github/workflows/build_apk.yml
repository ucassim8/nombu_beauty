name: Build NOMBU Beauty APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout your code
    - uses: actions/checkout@v3

    # 2️⃣ Install Flutter
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0' # Use your project’s Flutter version

    # 3️⃣ Set up Android SDK
    - uses: android-actions/setup-android@v2
      with:
        api-level: 35          # Matches compileSdkVersion
        target: android-35
        build-tools: 35.0.0

    # 4️⃣ Get Flutter dependencies
    - name: Get Flutter dependencies
      run: flutter pub get

    # 5️⃣ Build release APK
    - name: Build APK
      run: flutter build apk --release

    # 6️⃣ Upload APK artifact
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: nombu-beauty-apk
        path: build/app/outputs/flutter-apk/app-release.apk
