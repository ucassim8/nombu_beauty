name: Build NOMBU Beauty APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Flutter project structure
        run: |
          flutter create temp_app
          cp -r lib temp_app/
          cp pubspec.yaml temp_app/
          if [ -d assets ]; then cp -r assets temp_app/; fi
          cd temp_app

      - name: Install dependencies
        run: |
          cd temp_app
          flutter pub get

      - name: Build APK
        run: |
          cd temp_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nombu-beauty-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
